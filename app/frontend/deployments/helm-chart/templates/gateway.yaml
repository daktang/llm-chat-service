{{- if .Values.istio.enabled }}
{{- if not .Values.istio.gateway.existingGateway }}
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ .Values.istio.gateway.name | default (printf "%s-gateway" (include "llm-chat-service.fullname" .)) }}
  labels:
    {{- include "llm-chat-service.labels" . | nindent 4 }}
spec:
  selector:
    {{- toYaml .Values.istio.gateway.selector | nindent 4 }}
  servers:
    - port:
        number: {{ .Values.istio.gateway.port | default 80 }}
        name: http
        protocol: HTTP
      hosts:
        - {{ .Values.service.host | quote }}
{{- end }}
{{- end }}