{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "llm-chat-service.fullname" . }}
  labels:
    {{- include "llm-chat-service.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.service.host | quote }}
  gateways:
    {{- if .Values.istio.gateway.existingGateway }}
    - {{ .Values.istio.gateway.existingGateway }}
    {{- else }}
    - {{ .Values.istio.gateway.name | default (printf "%s-gateway" (include "llm-chat-service.fullname" .)) }}
    {{- end }}
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: {{ include "llm-chat-service.fullname" . }}
            port:
              number: {{ .Values.service.port }}
{{- end }}